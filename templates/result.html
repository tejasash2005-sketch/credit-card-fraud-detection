<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fraud Detection Result</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: #f4f6f8;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background: #ffffff;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      color: #333;
    }

    .container {
      padding: 40px 20px;
    }

    .accuracy {
      font-size: 18px;
      margin-bottom: 20px;
      color: #555;
    }

    .status-box {
      background: #ffffff;
      padding: 25px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .status {
      font-size: 24px;
      margin: 20px 0;
    }

    .fraud {
      color: red;
      font-weight: bold;
    }

    .not-fraud {
      color: green;
      font-weight: bold;
    }

    .btn-info {
      margin-top: 20px;
      padding: 12px 25px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-info:hover {
      background: #0056b3;
    }

    @media (max-width: 768px) {
      .status-box {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Credit Card Fraud Detection Results</h1>
</header>

<div class="container">

  <!-- Accuracy -->
  <div class="accuracy">
    Model Accuracy: <strong>{{ accuracy }}%</strong>
  </div>

  <!-- Status -->
  <div class="status-box">
    <h2 style="color: blueviolet;">✔ Validation Completed</h2>

    <div class="status">
      {% if prediction|int == 0 %}
        <p class="not-fraud">
          ✅ This transaction is NOT Fraud
        </p>
      {% elif prediction|int == 1 %}
        <p class="fraud">
          ⚠️ This transaction is FRAUD
        </p>
      {% else %}
        <p>⚠️ Unable to determine result</p>
      {% endif %}
    </div>
  </div>

  <!-- Button -->
  <a href="{{ url_for('index') }}">
    <button class="btn-info">🔁 Test Again</button>
  </a>

</div>

</body>
</html>
